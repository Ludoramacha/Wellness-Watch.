<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f64515">
    <meta name="description" content="AURA Clinician View - Blood Pressure Patient Monitoring">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AURA">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' fill='%23f64515' rx='45'/><text x='96' y='106' font-size='96' font-weight='bold' fill='%23fff' text-anchor='middle' font-family='Syne'>A</text></svg>">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Clinician View - AURA</title>
</head>
<body>

<main class="page-container">

<section id="clinician-page" class="page active">
    <div class="clinician-banner">
        <img src="https://images.unsplash.com/photo-1551601651-2a8555f1a136?w=900&q=80&auto=format&fit=crop" alt="Medical" loading="lazy">
        <div class="clinician-banner-text">
            <h2>Patient Monitor</h2>
            <p>All patients · Sorted by risk</p>
        </div>
    </div>

    <div style="height: 52px;"></div>

    <div style="display:flex;justify-content:space-between;padding:0 20px 16px;align-items:center;">
        <h3>Patients</h3>
        <div>
            <button class="btn-text" id="refreshPatientsBtn">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
            <button class="btn-text danger" id="logoutBtn" style="margin-left:8px;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <div id="patients-list" style="padding:0 20px;">
        <p class="empty-state">Loading patients…</p>
    </div>

    <div style="height: 24px;"></div>
</section>

</main>

<script src="js/auth.js"></script>
<script src="js/clinician.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js').then((registration) => {
        console.log('Service Worker registered:', registration);
      }).catch((err) => {
        console.log('Service Worker registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
